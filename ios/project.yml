name: CivicPulse

options:
  bundleIdPrefix: org.techoversight
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  CivicPulse:
    type: application
    platform: iOS
    sources:
      - path: CivicPulse
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.techoversight.civicpulse
        PRODUCT_NAME: CivicPulse
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: CivicPulse/CivicPulse.entitlements
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: CivicPulse/Info.plist
      properties:
        CFBundleDisplayName: CivicPulse
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
        ITSAppUsesNonExemptEncryption: false
        # Allow plain-HTTP requests to localhost / LAN backends during development.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
